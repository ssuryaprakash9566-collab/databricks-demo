bundle:
    name: databricks-demo

workspace:
    host: https://dbc-5aabb08f-c102.cloud.databricks.com

targets:
    dev:
      mode: development

    prod:
      mode: production

resources:
    jobs:
      my_demo_job:
        name: "Demo Job - ${bundle.target}"
        tasks:
          - task_key: run_script
            spark_python_task:
              python_file: src/jobs/my_job.py
            environment_key: default
        environments:
          - environment_key: default
            spec:
              client: "2"